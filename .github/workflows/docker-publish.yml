name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - .github/workflows/docker-publish.yml
      - .dockerignore
      - Dockerfile
      - docker/**
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - proto/**
      - src/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/rogue324/simpleloreauth

jobs:
  build-and-push:
    name: Build and push all-in-one image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: image
        shell: bash
        run: |
          tags="${IMAGE_NAME}:sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=$'\n'"${IMAGE_NAME}:latest"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=$'\n'"${IMAGE_NAME}:${GITHUB_REF_NAME}"
            tags+=$'\n'"${IMAGE_NAME}:${version}"
          fi

          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=SimpleLoreAuth
            org.opencontainers.image.description=All-in-one EpicGames Lore authentication service with integrated Caddy HTTPS and gRPC proxy
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
