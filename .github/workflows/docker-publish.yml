name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - .github/workflows/docker-publish.yml
      - .dockerignore
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - proto/**
      - src/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push multi-platform image
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      meta-images: ghcr.io/rogue324/simpleloreauth
      meta-tags: |
        type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
        type=sha,prefix=sha-
        type=ref,event=tag
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
      labels: |
        org.opencontainers.image.title=SimpleLoreAuth
        org.opencontainers.image.description=Authentication and authorization service for EpicGames Lore
        org.opencontainers.image.licenses=MIT
        org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      set-meta-labels: true
      cache: true
      cache-mode: max
      sbom: true
      sign: auto
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
