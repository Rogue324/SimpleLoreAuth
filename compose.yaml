name: simpleloreauth

services:
  lore-auth:
    image: ${LORE_AUTH_IMAGE:-ghcr.io/rogue324/simpleloreauth:latest}
    restart: unless-stopped
    ports:
      - "${LORE_AUTH_HTTPS_PORT:-10443}:10443"
    environment:
      LORE_AUTH_URL: ${LORE_AUTH_URL:?set the public HTTPS URL}
      LORE_AUTH_PASSWORD: ${LORE_AUTH_PASSWORD:-}
      LORE_SERVER_URL: ${LORE_SERVER_URL:-}
      LORE_AUTH_TLS_MODE: ${LORE_AUTH_TLS_MODE:-manual}
    volumes:
      - ${LORE_AUTH_DATA_DIR:-./data}:/data
      - ${CADDY_CERTS_DIR:-./certs}:/certs:ro
